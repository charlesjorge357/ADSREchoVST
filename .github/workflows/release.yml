name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    name: Build Release ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Windows-VST3
            os: windows-latest
            artifact_name: ADSREcho-Windows
            cmake_args: -DCMAKE_BUILD_TYPE=Release

          - name: macOS-Universal-VST3-AU
            os: macos-13
            artifact_name: ADSREcho-macOS
            cmake_args: -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

          - name: Linux-VST3
            os: ubuntu-22.04
            artifact_name: ADSREcho-Linux
            cmake_args: -DCMAKE_BUILD_TYPE=Release

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # ===== Windows Installer (Inno Setup) =====
      - name: Build Windows Installer
        if: runner.os == 'Windows'
        run: |
          iscc /DAppVersion="${{ steps.version.outputs.VERSION }}" installer\windows\installer.iss
        shell: cmd

      # ===== macOS Installer (pkgbuild) =====
      - name: Build macOS Installer
        if: runner.os == 'macOS'
        run: |
          chmod +x installer/macos/build_pkg.sh
          cd installer/macos
          ./build_pkg.sh "${{ steps.version.outputs.VERSION }}"

      # ===== Linux (tar.gz — no installer standard) =====
      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp -r build/*_artefacts/Release/VST3/* release/
          cd release
          tar -czf ../ADSREcho-Linux-${{ steps.version.outputs.VERSION }}.tar.gz *

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.exe
            release/*.pkg
            *.tar.gz

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ADSR-Echo v${{ steps.version.outputs.VERSION }}
          body: |
            ## ADSR-Echo Multi-Effect Plugin v${{ steps.version.outputs.VERSION }}

            ### Features
            - Algorithmic Reverb (Hall & Plate models)
            - Delay with BPM sync, Ping-Pong, and filtering
            - Flexible routing and mixing system

            ### Downloads
            - **Windows**: Run the `.exe` installer — places VST3 in the standard plugin directory
            - **macOS**: Run the `.pkg` installer — installs VST3 and AU to system plugin directories
            - **Linux**: Extract `.tar.gz` and copy VST3 to `~/.vst3/`

            ### Supported DAWs
            - FL Studio (VST3)
            - Ableton Live (VST3, AU on macOS)

            ### System Requirements
            - Windows 10 or later / macOS 10.13+ / Linux (Ubuntu 20.04+)

            ---
            Built with JUCE Framework | Licensed under GPLv3
          files: |
            artifacts/**/*.exe
            artifacts/**/*.pkg
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
